name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,azure]"

      - name: Lint
        run: python -m ruff check .

      - name: Type-check
        run: python -m mypy

      - name: Test
        run: python -m pytest

      - name: Security scan
        run: |
          python -m bandit -r src
          python -m pip_audit

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build image
        run: docker build -t copilot-python-app:${{ github.sha }} .

