services:
  app:
    build:
      context: .
    environment:
      APP_ENVIRONMENT: local
      APP_LOG_LEVEL: INFO
      APP_NAME: copilot-python-app
      APP_VERSION: 0.1.0
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

